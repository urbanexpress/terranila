<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaFlow Dashboard</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom CSS -->
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        /* A4 Print Layout Styles */
        @page {
            size: A4 portrait;
            margin: 0;
        }
        
        @media print {
            body {
                background-color: white !important;
                margin: 0;
                padding: 0;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .a4-container {
                width: 100% !important; /* Biarkan browser yang menyesuaikan lebar maksimal saat print */
                max-width: 210mm !important;
                min-height: auto !important; /* Menghindari error blank page overflow di Chrome */
                margin: 0 !important;
                padding: 10mm !important;
                box-shadow: none !important;
                border: none !important;
            }
            .no-print { display: none !important; }
            .break-inside-avoid { break-inside: avoid; }
            .break-before-page { break-before: page; }
        }

        /* Screen Preview for A4 */
        .a4-container {
            width: 210mm;
            min-height: 297mm;
            margin: 2rem auto;
            background: white;
            padding: 10mm;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
        }
    </style>

    <!-- Babel for in-browser JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <!-- Application Script -->
    <script type="text/babel" data-type="module">
        import React, { useState, useMemo, useEffect } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { 
          LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip as RechartsTooltip, Legend, ResponsiveContainer, PieChart, Pie, Cell, ComposedChart, Area, AreaChart
        } from 'https://esm.sh/recharts@2.12.0';
        import { 
          LayoutDashboard, Droplets, Fish, Wheat, Activity, DollarSign, Settings, Plus, Trash2, TrendingUp, TrendingDown, AlertTriangle, MapPin, Maximize, Calendar, Scale, X, Menu, PackageCheck, Archive, CheckSquare, ShoppingCart, ChevronRight, ChevronLeft, Info, CalendarDays, Target, Ruler, ClipboardList, History, Timer, Filter, FileText, Thermometer, Wind, TestTube, Waves, Edit, MinusCircle, PlusCircle, CheckCircle2, BadgeDollarSign, Wallet, Landmark, Receipt, Box, Layers, Tags, UserCog, Lock, Mail, Phone, Building, ActivitySquare, Clock, Download, Printer, Lightbulb, PieChart as PieChartIcon, Stethoscope, Droplets as WaterDrop, Activity as Heartbeat, CheckCircle, Flame
        } from 'https://esm.sh/lucide-react@0.330.0';

        // --- KONSTANTA GLOBAL ---
        const INITIAL_PONDS = [];
        const INITIAL_HISTORY = [];
        const INITIAL_HARVESTS = [];
        const INITIAL_COMPLETED_CYCLES = [];
        const INITIAL_SALES = [];
        const INITIAL_EXPENSES = [];
        const INITIAL_PRICES = [];

        const LOGO_URL = "https://i.ibb.co.com/fznjRcxy/Desain-tanpa-judul-7.png";
        const COLORS = ['#0d9488', '#f59e0b', '#3b82f6', '#ef4444', '#8b5cf6', '#10b981']; // Tailwind colors

        const formatCurrency = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num || 0);
        const roundTwoDecimals = (num) => Math.round(((num || 0) + Number.EPSILON) * 100) / 100;

        // --- AUTHENTICATION COMPONENTS ---
        const AuthScreen = ({ onLogin, onRegister, registeredUser }) => {
          const [view, setView] = useState('login');
          
          const [loginEmail, setLoginEmail] = useState('');
          const [loginPassword, setLoginPassword] = useState('');
          const [loginError, setLoginError] = useState('');

          const [regData, setRegData] = useState({
            namaUsaha: '', namaLengkap: '', kelurahan: '', kecamatan: '', kota: '', alamatLengkap: '', noHp: '', email: '', password: ''
          });

          const handleLoginSubmit = (e) => {
            e.preventDefault();
            if (registeredUser && registeredUser.email === loginEmail && registeredUser.password === loginPassword) {
              onLogin(registeredUser);
            } else {
              setLoginError('Email atau password salah, atau Anda belum mendaftar!');
            }
          };

          const handleRegisterSubmit = (e) => {
            e.preventDefault();
            onRegister(regData);
            setView('login');
            setLoginEmail(regData.email);
            setLoginPassword('');
            alert('Pendaftaran berhasil! Silakan login menggunakan akun Anda.');
          };

          const handleRegChange = (e) => {
            setRegData({ ...regData, [e.target.name]: e.target.value });
          };

          return (
            <div className="min-h-screen bg-slate-50 flex flex-col justify-center items-center p-4">
              <div className="w-full max-w-md bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden animate-in fade-in zoom-in duration-300">
                <div className="bg-slate-900 p-8 flex flex-col items-center justify-center border-b border-slate-800">
                  <img src={LOGO_URL} alt="App Logo" className="h-20 w-auto object-contain mb-4 drop-shadow-md" />
                  <h2 className="text-white text-xl font-bold tracking-wider">{view === 'login' ? 'Login ke Sistem' : 'Daftar Akun Baru'}</h2>
                  <p className="text-slate-400 text-sm mt-1">{view === 'login' ? 'Silakan masuk untuk mengelola tambak Anda' : 'Lengkapi form biodata berikut untuk mendaftar'}</p>
                </div>

                <div className="p-8">
                  {view === 'login' ? (
                    <form onSubmit={handleLoginSubmit} className="space-y-5">
                      {loginError && <div className="p-3 bg-red-50 text-red-600 text-sm font-semibold rounded-lg border border-red-100 flex items-center gap-2"><AlertTriangle size={16}/> {loginError}</div>}
                      
                      <div className="space-y-1.5">
                        <label className="text-sm font-semibold text-slate-700 flex items-center gap-2"><Mail size={16}/> Email</label>
                        <input required type="email" value={loginEmail} onChange={e => setLoginEmail(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500 outline-none transition" placeholder="Masukkan email terdaftar" />
                      </div>
                      <div className="space-y-1.5">
                        <label className="text-sm font-semibold text-slate-700 flex items-center gap-2"><Lock size={16}/> Password</label>
                        <input required type="password" value={loginPassword} onChange={e => setLoginPassword(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500 outline-none transition" placeholder="Masukkan password" />
                      </div>
                      
                      <button type="submit" className="w-full py-3.5 bg-teal-600 text-white rounded-xl font-bold hover:bg-teal-700 transition shadow-lg shadow-teal-100 mt-6">Masuk ke Dashboard</button>
                      
                      <div className="text-center mt-6">
                        <p className="text-sm text-slate-500">Belum punya akun? <button type="button" onClick={() => setView('register')} className="text-teal-600 font-bold hover:underline">Daftar Sekarang</button></p>
                      </div>
                    </form>
                  ) : (
                    <form onSubmit={handleRegisterSubmit} className="space-y-4 max-h-[50vh] overflow-y-auto pr-2 pb-2 scrollbar-hide">
                      <div className="space-y-1.5">
                        <label className="text-xs font-semibold text-slate-700 uppercase">Nama Usaha / Tambak</label>
                        <input required name="namaUsaha" value={regData.namaUsaha} onChange={handleRegChange} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-teal-500" placeholder="Ex: Jaya Abadi Farm" />
                      </div>
                      <div className="space-y-1.5">
                        <label className="text-xs font-semibold text-slate-700 uppercase">Nama Lengkap Pemilik</label>
                        <input required name="namaLengkap" value={regData.namaLengkap} onChange={handleRegChange} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-teal-500" placeholder="Sesuai KTP" />
                      </div>
                      
                      <div className="grid grid-cols-2 gap-3">
                        <div className="space-y-1.5">
                          <label className="text-xs font-semibold text-slate-700 uppercase">No HP / WhatsApp</label>
                          <input required name="noHp" value={regData.noHp} onChange={handleRegChange} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-teal-500" placeholder="0812..." />
                        </div>
                        <div className="space-y-1.5">
                          <label className="text-xs font-semibold text-slate-700 uppercase">Email</label>
                          <input required type="email" name="email" value={regData.email} onChange={handleRegChange} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-teal-500" placeholder="email@domain.com" />
                        </div>
                      </div>

                      <div className="space-y-1.5">
                        <label className="text-xs font-semibold text-slate-700 uppercase">Password</label>
                        <input required type="password" name="password" value={regData.password} onChange={handleRegChange} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-teal-500" placeholder="Buat password" />
                      </div>

                      <div className="pt-2 pb-1"><div className="border-t border-slate-100"></div></div>

                      <div className="space-y-1.5">
                        <label className="text-xs font-semibold text-slate-700 uppercase">Alamat Lengkap Usaha</label>
                        <textarea required name="alamatLengkap" value={regData.alamatLengkap} onChange={handleRegChange} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-teal-500 resize-none" rows="2" placeholder="Nama jalan, RT/RW, no rumah/bangunan"></textarea>
                      </div>
                      
                      <div className="grid grid-cols-2 gap-3">
                        <div className="space-y-1.5">
                          <label className="text-xs font-semibold text-slate-700 uppercase">Kelurahan</label>
                          <input required name="kelurahan" value={regData.kelurahan} onChange={handleRegChange} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-teal-500" />
                        </div>
                        <div className="space-y-1.5">
                          <label className="text-xs font-semibold text-slate-700 uppercase">Kecamatan</label>
                          <input required name="kecamatan" value={regData.kecamatan} onChange={handleRegChange} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-teal-500" />
                        </div>
                      </div>
                      <div className="space-y-1.5">
                        <label className="text-xs font-semibold text-slate-700 uppercase">Kota / Kabupaten</label>
                        <input required name="kota" value={regData.kota} onChange={handleRegChange} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-teal-500" />
                      </div>

                      <button type="submit" className="w-full py-3 bg-teal-600 text-white rounded-xl font-bold hover:bg-teal-700 transition shadow-lg shadow-teal-100 mt-4">Daftar Akun</button>
                      
                      <div className="text-center pt-4">
                        <p className="text-sm text-slate-500">Sudah punya akun? <button type="button" onClick={() => setView('login')} className="text-teal-600 font-bold hover:underline">Login Disini</button></p>
                      </div>
                    </form>
                  )}
                </div>
              </div>
            </div>
          );
        };

        // --- KOMPONEN: LAPORAN A4 PRINT (OVERLAY IN-APP) ---
        const PrintReportView = ({ reportData, onClose }) => {
            useEffect(() => {
                // Otomatis memunculkan dialog print setelah render
                const timer = setTimeout(() => window.print(), 800);
                return () => clearTimeout(timer);
            }, []);

            if (!reportData) return null;

            const { cycle = {}, sales = [], historyLogs = [], expenses = [], ponds = [], harvests = [], userProfile = {} } = reportData;
            
            // --- KALKULASI MENDALAM ---
            const pondNameInfo = cycle.pondName || 'Kolam Tidak Diketahui';
            const fishTypeInfo = cycle.fishType || 'Ikan Air Tawar';
            const cycleLogs = historyLogs.filter(l => l.cycleId === cycle.id).sort((a,b) => new Date(a.date) - new Date(b.date));
            const cycleHarvests = harvests.filter(h => h.cycleId === cycle.id);
            const cycleSales = sales.filter(s => s.cycleId === cycle.id);

            // Kita cari initialStock yang sebenernya dari ponds (waktu tebar) atau ambil cycle.capacity fallback
            const pondData = ponds.find(p => p.id === cycle.pondId || p.cycleId === cycle.id) || {};
            const initialStock = Number(pondData.capacity) || Number(cycle.capacity) || 0; 
            const initialSeedCost = Number(cycle.seedCost) || 0;

            const totalRevenue = cycleSales.reduce((sum, s) => sum + (Number(s.total) || 0), 0);
            const totalHarvestWeight = Number(cycle.totalHarvestWeight) || 0;
            const totalHarvestEkor = cycleHarvests.reduce((sum, h) => sum + (Number(h.estimatedCount) || 0), 0);
            
            let totalFeedWeight = 0;
            let totalFeedCost = 0;
            const feedBrandsUsed = new Set();
            
            let totalMedCost = 0;
            const medUsageLogs = [];

            cycleLogs.forEach(log => {
                const fAmt = Number(log.feedAmount) || 0;
                if(fAmt > 0) {
                    totalFeedWeight += fAmt;
                    if(log.feedBrand) feedBrandsUsed.add(log.feedBrand);
                }
                const mAmt = Number(log.medAmount) || 0;
                if(mAmt > 0) {
                    medUsageLogs.push(log);
                }
            });

            // Estimasi Biaya
            feedBrandsUsed.forEach(brand => {
                const brandExp = expenses.filter(e => e.category === 'Pakan' && e.brand === brand);
                brandExp.forEach(e => totalFeedCost += Number(e.amount));
            });
            medUsageLogs.forEach(log => {
                const medExp = expenses.filter(e => e.category === 'Obat/Vitamin' && e.brand === log.medBrand);
                medExp.forEach(e => totalMedCost += Number(e.amount));
            });

            const totalExpense = initialSeedCost + totalFeedCost + totalMedCost;
            const netProfit = totalRevenue - totalExpense;

            const startDate = new Date(cycle.startDate);
            const endDate = new Date(cycle.endDate || new Date().toISOString().split('T')[0]);
            const durasiHari = Math.max(1, Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24)));
            
            const totalMortality = cycleLogs.reduce((sum, l) => sum + (Number(l.mortality) || 0), 0);
            
            // Perbaikan nilai SR & Aktual tebar
            const actualInitial = initialStock > 0 ? initialStock : Math.round(totalHarvestEkor / 0.95) || 1;
            const SR = (totalHarvestEkor / actualInitial) * 100;
            const FCR = totalHarvestWeight > 0 ? (totalFeedWeight / totalHarvestWeight) : 0;
            
            const lastLogWithSample = [...cycleLogs].reverse().find(l => (Number(l.sampleWeight) || 0) > 0);
            let avgABWAkhir = lastLogWithSample ? lastLogWithSample.sampleWeight : (totalHarvestEkor > 0 ? ((totalHarvestWeight * 1000) / totalHarvestEkor).toFixed(1) : 0);
            const avgDailyMortality = durasiHari > 0 ? (totalMortality / durasiHari).toFixed(1) : 0;
            
            // KUALITAS AIR STATS
            const wqParams = { temp: [], ph: [], do: [], sal: [] };
            cycleLogs.forEach(l => {
                if(Number(l.temperature) > 0) wqParams.temp.push(Number(l.temperature));
                if(Number(l.ph) > 0) wqParams.ph.push(Number(l.ph));
                if(Number(l.dissolvedOxygen) > 0) wqParams.do.push(Number(l.dissolvedOxygen));
                if(Number(l.salinity) > 0) wqParams.sal.push(Number(l.salinity));
            });
            const getStat = (arr) => arr.length > 0 ? {
                min: Math.min(...arr).toFixed(1),
                max: Math.max(...arr).toFixed(1),
                avg: (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1)
            } : { min: '-', max: '-', avg: '-' };
            const waterMetrics = { temp: getStat(wqParams.temp), ph: getStat(wqParams.ph), do: getStat(wqParams.do), sal: getStat(wqParams.sal) };

            const growthData = cycleLogs.filter(l => (Number(l.sampleWeight) || 0) > 0).map(l => ({
                tanggal: l.date.substring(5),
                berat: Number(l.sampleWeight)
            }));

            // --- ANALISIS MENDALAM (ALGORITMA LOKAL) ---
            const generateAnalysis = () => {
                let general = [];
                let anomalies = [];
                let medEffectiveness = [];

                // 1. Analisis FCR
                if (FCR > 0) {
                    if (FCR <= 1.2) general.push("✅ FCR sangat baik (≤ 1.2). Rasio konversi pakan sangat efisien, menandakan kualitas pakan dan manajemen nafsu makan ikan optimal.");
                    else if (FCR <= 1.5) general.push("ℹ️ FCR normal. Penggunaan pakan cukup efisien dan sesuai dengan standar budidaya pada umumnya.");
                    else general.push(`⚠️ FCR tinggi (${FCR.toFixed(2)}). Terindikasi pemborosan pakan (overfeeding) atau pakan tidak terserap daging dengan baik. Evaluasi metode pemberian pakan.`);
                } else {
                    general.push("ℹ️ Belum ada data perbandingan FCR yang valid.");
                }

                // 2. Analisis SR & Mortalitas
                if (SR >= 85) general.push(`✅ Survival Rate (SR) memuaskan (${SR.toFixed(1)}%). Kualitas benih, aklimatisasi, dan manajemen stres terbukti sangat baik.`);
                else if (SR > 0 && SR < 85) general.push(`⚠️ Survival Rate rendah (${SR.toFixed(1)}%). Terdapat tingkat mortalitas konstan, perlukan evaluasi kualitas air, benih awal, dan penanganan hama.`);

                // 3. Deteksi Anomali Kualitas Air & Spike Kematian
                cycleLogs.forEach((log) => {
                    const mort = Number(log.mortality) || 0;
                    const logDO = Number(log.dissolvedOxygen) || 0;
                    const logPH = Number(log.ph) || 0;
                    
                    // Deteksi Spike Kematian (jika kematian dalam 1 hari > 0.5% populasi)
                    if (actualInitial > 0 && mort > (actualInitial * 0.005)) {
                        anomalies.push(`[${log.date}] Spike Mortalitas: Terjadi kematian massal ${mort} ekor. Cek riwayat DO dan pemberian pakan di tanggal tersebut.`);
                    }
                    if (logDO > 0 && logDO < 3.5) anomalies.push(`[${log.date}] Anomali Oksigen: DO drop ekstrem ke ${logDO} mg/L. Berisiko hipoksia pada ikan.`);
                    if (logPH > 0 && (logPH < 6.0 || logPH > 9.0)) anomalies.push(`[${log.date}] Anomali pH Air: Angka pH tidak stabil (${logPH}), dapat memicu stres adaptif.`);
                });

                // 4. Analisis Efektivitas Obat/Vitamin
                if (medUsageLogs.length > 0) {
                    const firstMedIndex = cycleLogs.findIndex(l => l.id === medUsageLogs[0].id);
                    if (firstMedIndex > 0) {
                        const beforeLogs = cycleLogs.slice(Math.max(0, firstMedIndex - 3), firstMedIndex);
                        const afterLogs = cycleLogs.slice(firstMedIndex + 1, Math.min(cycleLogs.length, firstMedIndex + 4));

                        const avgMortBefore = beforeLogs.reduce((s,l) => s+Number(l.mortality||0), 0) / (beforeLogs.length || 1);
                        const avgMortAfter = afterLogs.reduce((s,l) => s+Number(l.mortality||0), 0) / (afterLogs.length || 1);

                        if (avgMortAfter < avgMortBefore) {
                            medEffectiveness.push(`✅ Pemberian ${medUsageLogs[0].medBrand} pada ${medUsageLogs[0].date} dinilai EFEKTIF. Rata-rata mortalitas turun dari ${avgMortBefore.toFixed(1)} ekor/hari menjadi ${avgMortAfter.toFixed(1)} ekor/hari.`);
                        } else {
                            medEffectiveness.push(`⚠️ Pemberian ${medUsageLogs[0].medBrand} pada ${medUsageLogs[0].date} KURANG OPTIMAL. Tingkat mortalitas masih di kisaran ${avgMortAfter.toFixed(1)} ekor/hari pasca aplikasi. Perlu diagnosis lanjutan.`);
                        }
                    } else {
                        medEffectiveness.push(`ℹ️ Obat ${medUsageLogs[0].medBrand} diberikan pada awal siklus (${medUsageLogs[0].date}) sebagai tindakan preventif.`);
                    }
                } else {
                    medEffectiveness.push("ℹ️ Tidak ada catatan pemberian obat atau vitamin selama siklus ini.");
                }

                return { general, anomalies: [...new Set(anomalies)].slice(0, 5), medEffectiveness };
            };

            const analisis = generateAnalysis();

            return (
                <div className="fixed inset-0 z-[100] bg-slate-50 overflow-y-auto w-full h-full">
                    {/* Top Bar Navigation (Hidden when printing) */}
                    <div className="no-print sticky top-0 bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shadow-sm z-50">
                        <div className="flex items-center gap-4">
                            <button onClick={onClose} className="p-2 hover:bg-slate-100 text-slate-500 rounded-full transition"><X size={24}/></button>
                            <h2 className="font-bold text-slate-800 text-lg">Preview Laporan Detail Siklus A4</h2>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={() => window.print()} className="bg-teal-600 text-white px-5 py-2.5 rounded-lg font-bold flex items-center gap-2 hover:bg-teal-700 transition shadow-lg">
                                <Printer size={18}/> Cetak Dokumen A4
                            </button>
                        </div>
                    </div>

                    {/* A4 Document Area */}
                    <div className="py-8 no-print pb-24"> 
                        <div className="a4-container text-slate-800 relative">
                            {/* HEADER */}
                            <div className="flex justify-between items-center border-b-4 border-teal-700 pb-4 mb-5">
                                <div className="flex items-center gap-4">
                                    <img src={LOGO_URL} alt="Logo" className="h-16 object-contain" />
                                    <div>
                                        <h1 className="text-2xl font-black text-slate-900 uppercase tracking-tight">Laporan Siklus Produksi</h1>
                                        <p className="text-sm font-bold text-teal-700">Budidaya {fishTypeInfo}</p>
                                    </div>
                                </div>
                                <div className="text-right">
                                    <p className="text-xs text-slate-500 font-bold uppercase mb-1">Periode Siklus ({durasiHari} Hari)</p>
                                    <p className="text-base font-black text-slate-800">{cycle.startDate} s/d {cycle.endDate}</p>
                                </div>
                            </div>

                            {/* IDENTITAS */}
                            <div className="grid grid-cols-3 gap-3 mb-5 bg-slate-50 p-3 rounded-lg border border-slate-200">
                                <div className="flex items-start gap-2">
                                    <Box size={16} className="text-slate-500 mt-0.5"/>
                                    <div><p className="text-[10px] text-slate-500 uppercase font-bold">Nama Usaha / ID Siklus</p><p className="text-xs font-bold text-slate-800">{userProfile?.namaUsaha || 'Usaha Mandiri'} / {cycle.id}</p></div>
                                </div>
                                <div className="flex items-start gap-2">
                                    <UserCog size={16} className="text-slate-500 mt-0.5"/>

          const [startDate, setStartDate] = useState(firstDay);
          const [endDate, setEndDate] = useState(todayStr);

          const filteredData = useMemo(() => {
            return ponds.map(pond => {
              const logs = historyLogs.filter(log => 
                log.pondId === pond.id && 
                log.date >= startDate && 
                log.date <= endDate
              );
              
              const totalMortality = logs.reduce((sum, log) => sum + (Number(log.mortality) || 0), 0);
              const totalFeed = logs.reduce((sum, log) => sum + (Number(log.feedAmount) || 0), 0);
              
              const sortedLogs = [...logs].sort((a, b) => new Date(b.date) - new Date(a.date));
              const latestLog = sortedLogs[0];
              const latestBiomass = latestLog ? (Number(latestLog.biomass) || 0) : 0;
              const abw = latestLog ? (Number(latestLog.sampleWeight) || 0) : 0;
              
              const fcr = latestBiomass > 0 ? (totalFeed / latestBiomass).toFixed(2) : '0.00';
              const sr = pond.capacity > 0 ? ((pond.currentStock / pond.capacity) * 100).toFixed(1) : '0.0';

              return {
                ...pond,
                totalMortality,
                totalFeed,
                latestBiomass,
                abw,
                fcr,
                sr
              };
            });

                        <th className="px-5 py-3 font-bold uppercase text-[10px] tracking-wider text-right">Sisa Hidup</th>
                        <th className="px-5 py-3 font-bold uppercase text-[10px] tracking-wider text-right">SR (%)</th>

        const SalesTab = ({ harvests, sales, prices, historyLogs, completedCycles, onAddSale, onUpdateSale }) => {
          const [showForm, setShowForm] = useState(false);
          const [formData, setFormData] = useState({ date: new Date().toISOString().split('T')[0], harvestId: '', buyer: '', size: '', amount: '', unit: 'kg', price: '', paymentMethod: 'Cash' });
          const [editingSale, setEditingSale] = useState(null);

          const selectedHarvest = useMemo(() => harvests.find(h => h.id === formData.harvestId), [formData.harvestId, harvests]);

          const profitEstimations = useMemo(() => {
            return harvests.map(h => {
              const cycleInfo = completedCycles.find(c => c.id === h.cycleId);
              const seedCost = cycleInfo ? cycleInfo.seedCost : 0;
              const fishType = cycleInfo ? cycleInfo.fishType : 'Unknown';
              const totalFeedUsed = historyLogs.filter(log => log.cycleId === h.cycleId).reduce((sum, log) => sum + log.feedAmount, 0);
              const estimatedFeedPrice = 12000;
              const totalFeedCost = totalFeedUsed * estimatedFeedPrice;
              const totalVariableCost = seedCost + totalFeedCost;
              const marketPrice = prices?.find(p => p.fishType === fishType)?.price || 25000;
              const estimatedRevenue = h.totalWeight * marketPrice;
              const estimatedProfit = estimatedRevenue - totalVariableCost;

              return { ...h, fishType, totalVariableCost, estimatedRevenue, estimatedProfit, marketPriceRef: marketPrice };
            });
          }, [harvests, prices, historyLogs, completedCycles]);

          const handleChange = (e) => setFormData(prev => ({ ...prev, [e.target.name]: e.target.value }));

          const handleSubmit = (e) => {
            e.preventDefault();
            if (!formData.harvestId) return alert("Pilih sumber panen terlebih dahulu!");
            const total = parseFloat(formData.amount) * parseFloat(formData.price);

                          <div className="grid grid-cols-2 gap-3">
                            <div className="space-y-1.5"><label className="text-xs font-semibold text-slate-700">Jumlah Stok</label><input required type="number" step="any" onWheel={(e) => e.target.blur()} name="quantity" value={formData.quantity} onChange={handleChange} className="w-full px-3 py-1.5 bg-white border border-slate-200 rounded-lg focus:ring-1 focus:ring-red-500 outline-none text-sm" placeholder="0" /></div>

                          </div>
                        </div>
