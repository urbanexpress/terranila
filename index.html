                      <div className="space-y-1.5"><label className="text-sm font-semibold text-slate-700">Keterangan</label><textarea required name="description" value={formData.description} onChange={handleChange} className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-red-500 outline-none text-sm resize-none h-16" placeholder="Keterangan transaksi..."></textarea></div>
                      <div className="space-y-1.5"><label className="text-sm font-semibold text-slate-700">Total Harga (Rp)</label><input required type="number" onWheel={(e) => e.target.blur()} name="amount" value={formData.amount} onChange={handleChange} className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-red-500 outline-none text-sm font-bold text-red-600" placeholder="0" /></div>
                      <button type="submit" className="w-full py-3 bg-red-600 text-white rounded-lg font-bold hover:bg-red-700 transition shadow-lg shadow-red-100 mt-4 flex items-center justify-center gap-2"><CheckCircle2 size={18} /> Simpan & Update Stok</button>
                    </form>
                  </div>
                </div>

                <div className="xl:col-span-2">
                  <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden h-full">
                    <div className="p-5 border-b border-slate-100 bg-slate-50/50 flex items-center justify-between"><h3 className="text-base font-bold text-slate-800">Riwayat Pengeluaran</h3></div>
                    <div className="overflow-x-auto">
                      <table className="w-full text-left text-sm whitespace-nowrap">
                        <thead className="bg-slate-50 text-slate-500 border-b border-slate-200">
                          <tr><th className="px-5 py-4 font-bold uppercase text-[10px] tracking-wider">Tanggal</th><th className="px-5 py-4 font-bold uppercase text-[10px] tracking-wider">Kategori</th><th className="px-5 py-4 font-bold uppercase text-[10px] tracking-wider">Merk / Item</th><th className="px-5 py-4 font-bold uppercase text-[10px] tracking-wider">Stok Beli</th><th className="px-5 py-4 font-bold uppercase text-[10px] tracking-wider text-right">Nominal</th></tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                          {allExpenses.length > 0 ? allExpenses.map((e) => (
                            <tr key={e.id} className="hover:bg-slate-50 transition-colors">
                              <td className="px-5 py-3 text-slate-600">{e.date}</td><td className="px-5 py-3 font-bold text-slate-700">{e.category}</td>
                              <td className="px-5 py-3"><p className="font-semibold text-slate-800">{e.brand || '-'}</p><p className="text-[10px] text-slate-400 max-w-[150px] truncate">{e.description}</p></td>
                              <td className="px-5 py-3">{e.quantity ? (<span className="font-bold text-teal-600">+{e.quantity} {e.unit}</span>) : '-'}</td>
                              <td className="px-5 py-3 text-right">
                                <div className="flex flex-col items-end gap-1">
                                  <span className="font-bold text-red-500">-{formatCurrency(e.amount)}</span>
                                  {!e.isAuto && <button onClick={() => setEditingExpense(e)} className="text-[10px] text-slate-400 hover:text-amber-500 flex items-center gap-1 border border-slate-200 px-1.5 py-0.5 rounded bg-white shadow-sm transition"><Edit size={10}/> Edit</button>}
                                </div>
                              </td>
                            </tr>
                          )) : (<tr><td colSpan="5" className="px-5 py-12 text-center text-slate-400"><Wallet size={32} className="mx-auto mb-3 opacity-30" /><p className="font-medium">Belum ada data pengeluaran.</p></td></tr>)}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              </div>

              {editingExpense && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                  <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col animate-in fade-in zoom-in duration-200">
                    <div className="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                      <h3 className="font-bold text-slate-800 flex items-center gap-2"><Edit size={18} className="text-amber-500"/> Edit Pengeluaran</h3>
                      <button onClick={() => setEditingExpense(null)} className="text-slate-400 hover:text-slate-600"><X size={20}/></button>
                    </div>
                    <form onSubmit={handleEditExpenseSubmit} className="p-5 space-y-4 max-h-[75vh] overflow-y-auto scrollbar-hide">
                       <div className="space-y-1.5"><label className="text-sm font-semibold text-slate-700">Tanggal Transaksi</label><input required type="date" name="date" value={editingExpense.date} onChange={handleEditExpenseChange} className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none text-sm" /></div>
                       <div className="space-y-1.5"><label className="text-sm font-semibold text-slate-700">Kategori</label><select required name="category" value={editingExpense.category} onChange={handleEditExpenseChange} className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none text-sm"><option value="Pakan">Pakan</option><option value="Obat/Vitamin">Obat / Vitamin</option><option value="Bibit/Benih">Bibit / Benih</option><option value="Operasional (Listrik/Air)">Operasional (Listrik/Air/BBM)</option><option value="Gaji Pekerja">Gaji Pekerja</option><option value="Perawatan Kolam">Perawatan / Perbaikan Kolam</option><option value="Lain-lain">Lain-lain</option></select></div>
                       {['Pakan', 'Obat/Vitamin', 'Bibit/Benih'].includes(editingExpense.category) && (
                          <div className="p-3 bg-slate-50 border border-slate-100 rounded-xl space-y-3">
                            <div className="space-y-1.5"><label className="text-xs font-semibold text-slate-700">Merk / Brand</label><input required name="brand" value={editingExpense.brand} onChange={handleEditExpenseChange} className="w-full px-3 py-1.5 bg-white border border-slate-200 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none text-sm" /></div>
                            <div className="grid grid-cols-2 gap-3">
                              <div className="space-y-1.5"><label className="text-xs font-semibold text-slate-700">Jumlah Stok Masuk</label><input required type="number" step="any" onWheel={(e) => e.target.blur()} name="quantity" value={editingExpense.quantity} onChange={handleEditExpenseChange} className="w-full px-3 py-1.5 bg-white border border-slate-200 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none text-sm" /></div>
                              <div className="space-y-1.5"><label className="text-xs font-semibold text-slate-700">Satuan</label><select name="unit" value={editingExpense.unit} onChange={handleEditExpenseChange} className="w-full px-3 py-1.5 bg-white border border-slate-200 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none text-sm font-bold"><option value="Kg">Kg</option><option value="Pcs">Pcs</option><option value="Ekor">Ekor</option><option value="Liter">Liter</option><option value="Sak">Sak</option><option value="Botol">Botol</option><option value="ml">ml</option><option value="gr">gr</option></select></div>
                            </div>
                          </div>
                       )}
                       <div className="space-y-1.5"><label className="text-sm font-semibold text-slate-700">Keterangan</label><textarea required name="description" value={editingExpense.description} onChange={handleEditExpenseChange} className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none text-sm resize-none h-16"></textarea></div>
                       <div className="space-y-1.5"><label className="text-sm font-semibold text-slate-700">Total Harga (Rp)</label><input required type="number" onWheel={(e) => e.target.blur()} name="amount" value={editingExpense.amount} onChange={handleEditExpenseChange} className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none text-sm font-bold text-red-600" /></div>
                       <button type="submit" className="w-full py-3 bg-amber-500 text-white rounded-lg font-bold hover:bg-amber-600 transition mt-4">Simpan Perubahan Pengeluaran</button>
                    </form>
                  </div>
                </div>
              )}
            </div>
          );
        };

        const InventoryTab = ({ expenses, historyLogs }) => {
          const inventoryData = useMemo(() => {
            const stockMap = {};
            expenses.forEach(exp => {
              if (exp.brand && exp.quantity > 0) {
                const key = `${exp.category}-${exp.brand}`;
                if (!stockMap[key]) stockMap[key] = { category: exp.category, brand: exp.brand, unit: exp.unit, totalIn: 0, totalUsed: 0 };
                stockMap[key].totalIn += exp.quantity;
              }
            });
            historyLogs.forEach(log => {
              if (log.feedBrand && log.feedAmount > 0) {
                const key = `Pakan-${log.feedBrand}`;
                if (!stockMap[key]) stockMap[key] = { category: 'Pakan', brand: log.feedBrand, unit: 'Kg', totalIn: 0, totalUsed: 0 };
                stockMap[key].totalUsed += log.feedAmount;
              }
              if (log.medBrand && log.medAmount > 0) {
                const key = `Obat/Vitamin-${log.medBrand}`;
                if (!stockMap[key]) stockMap[key] = { category: 'Obat/Vitamin', brand: log.medBrand, unit: log.medUnit || '-', totalIn: 0, totalUsed: 0 };
                stockMap[key].totalUsed += log.medAmount;
              }
            });
            return Object.values(stockMap).map(item => ({
              ...item,
              totalIn: roundTwoDecimals(item.totalIn),
              totalUsed: roundTwoDecimals(item.totalUsed)
            })).sort((a, b) => a.category.localeCompare(b.category));
          }, [expenses, historyLogs]);

          const summary = {
            pakan: inventoryData.filter(i => i.category === 'Pakan').reduce((sum, i) => sum + (i.totalIn - i.totalUsed), 0),
            bibit: inventoryData.filter(i => i.category === 'Bibit/Benih').reduce((sum, i) => sum + (i.totalIn - i.totalUsed), 0),
            obat: inventoryData.filter(i => i.category === 'Obat/Vitamin').length
          };

          return (
            <div className="space-y-6">
              <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4"><div><h3 className="text-xl font-bold text-slate-800">Manajemen Inventori & Stok</h3><p className="text-sm text-slate-500">Merekap stok barang masuk dari pengeluaran dan pengurangan otomatis dari operasional</p></div></div>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                <StatCard title="Stok Pakan (Tersedia)" value={`${roundTwoDecimals(summary.pakan).toLocaleString()} Kg`} subValue="Merekap semua merk" icon={<Wheat size={24} className="text-amber-600" />} />
                <StatCard title="Bibit/Benih Tersimpan" value={`${summary.bibit.toLocaleString()} Ekor`} subValue="Stok tebar" icon={<Fish size={24} className="text-teal-600" />} />
                <StatCard title="Kategori Obat/Vitamin" value={`${summary.obat} Jenis`} subValue="Siap digunakan" icon={<TestTube size={24} className="text-emerald-600" />} />
              </div>
              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="p-5 border-b border-slate-100 bg-slate-50/50 flex items-center gap-2"><Layers size={20} className="text-teal-600" /><h3 className="text-base font-bold text-slate-800">Tabel Rekapitulasi Stok Barang</h3></div>
                <div className="overflow-x-auto">
                  <table className="w-full text-left text-sm whitespace-nowrap">
                    <thead className="bg-slate-50 text-slate-500 border-b border-slate-200">
                      <tr><th className="px-5 py-4 font-bold uppercase text-[10px] tracking-wider">Kategori</th><th className="px-5 py-4 font-bold uppercase text-[10px] tracking-wider">Merk / Barang</th><th className="px-5 py-4 font-bold uppercase text-[10px] tracking-wider text-right">Stok Masuk (Total)</th><th className="px-5 py-4 font-bold uppercase text-[10px] tracking-wider text-right">Terpakai (Aktual)</th><th className="px-5 py-4 font-bold uppercase text-[10px] tracking-wider text-right">Sisa Stok Saat Ini</th><th className="px-5 py-4 font-bold uppercase text-[10px] tracking-wider">Status Stok</th></tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100">
                      {inventoryData.length > 0 ? inventoryData.map((item, idx) => {
                        const stockLeft = roundTwoDecimals(item.totalIn - item.totalUsed);
                        const percentage = item.totalIn > 0 ? (stockLeft / item.totalIn) * 100 : 0;
                        return (
                          <tr key={idx} className="hover:bg-slate-50 transition-colors">
                            <td className="px-5 py-4"><span className={`px-2 py-0.5 rounded text-[10px] font-bold uppercase ${item.category === 'Pakan' ? 'bg-amber-100 text-amber-700' : item.category === 'Bibit/Benih' ? 'bg-teal-100 text-teal-700' : 'bg-emerald-100 text-emerald-700'}`}>{item.category}</span></td>
                            <td className="px-5 py-4 font-bold text-slate-800">{item.brand}</td>
                            <td className="px-5 py-4 text-right font-medium text-slate-600">{item.totalIn.toLocaleString()} {item.unit}</td>
                            <td className="px-5 py-4 text-right font-medium text-red-500">{item.totalUsed.toLocaleString()} {item.unit}</td>
                            <td className="px-5 py-4 text-right"><span className={`text-sm font-black ${stockLeft <= 0 ? 'text-red-600' : 'text-teal-600'}`}>{stockLeft.toLocaleString()} {item.unit}</span></td>
                            <td className="px-5 py-4">
                              <div className="flex items-center gap-3">
                                <div className="w-24 bg-slate-100 h-2 rounded-full overflow-hidden"><div className={`h-full transition-all duration-500 ${percentage < 20 ? 'bg-red-500' : percentage < 50 ? 'bg-amber-500' : 'bg-emerald-500'}`} style={{ width: `${Math.min(100, Math.max(0, percentage))}%` }}></div></div>
                                <span className="text-[10px] font-bold text-slate-400">{Math.round(percentage)}%</span>
                              </div>
                            </td>
                          </tr>
                        );
                      }) : (
                        <tr><td colSpan="6" className="px-5 py-12 text-center text-slate-400"><Box size={40} className="mx-auto mb-3 opacity-20" /><p className="font-medium">Inventori Kosong.</p><p className="text-xs mt-1">Stok akan muncul otomatis setelah Anda mencatat pengeluaran Pakan, Benih, atau Obat.</p></td></tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          );
        };

        const CyclesTab = ({ completedCycles, sales, expenses, historyLogs, ponds, harvests, userProfile, onOpenPrint }) => {
          
          return (
            <div className="space-y-6">
              <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4"><div><h3 className="text-xl font-bold text-slate-800">Riwayat Siklus Panen</h3><p className="text-sm text-slate-500">Arsip data kolam yang telah menyelesaikan 1 siklus penuh beserta laporan finansial</p></div></div>
              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden mt-6">
                <div className="p-5 border-b border-slate-100 bg-slate-50/50 flex items-center gap-2"><Archive size={20} className="text-teal-600" /><h3 className="text-base font-bold text-slate-800">Tabel Arsip Siklus Selesai</h3></div>
                <div className="overflow-x-auto">
                  <table className="w-full text-left text-sm whitespace-nowrap">
                    <thead className="bg-slate-50 text-slate-500 border-b border-slate-200">
                      <tr><th className="px-4 py-4 font-bold uppercase text-[10px] tracking-wider">ID Siklus</th><th className="px-4 py-4 font-bold uppercase text-[10px] tracking-wider">Kolam (Komoditas)</th><th className="px-4 py-4 font-bold uppercase text-[10px] tracking-wider">Periode</th><th className="px-4 py-4 font-bold uppercase text-[10px] tracking-wider text-right">Harga Jual</th><th className="px-4 py-4 font-bold uppercase text-[10px] tracking-wider text-right">Total Panen</th><th className="px-4 py-4 font-bold uppercase text-[10px] tracking-wider text-right">Biaya Bibit</th><th className="px-4 py-4 font-bold uppercase text-[10px] tracking-wider">Total Pakan</th><th className="px-4 py-4 font-bold uppercase text-[10px] tracking-wider">Total Obat/Vit</th><th className="px-4 py-4 font-bold uppercase text-[10px] tracking-wider text-right">Pengeluaran</th><th className="px-4 py-4 font-bold uppercase text-[10px] tracking-wider text-right">Pemasukan</th><th className="px-4 py-4 font-bold uppercase text-[10px] tracking-wider text-center">Aksi Laporan</th></tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100">
                      {completedCycles.length > 0 ? completedCycles.map((cycle) => {
                          const cycleSales = sales.filter(s => s.cycleId === cycle.id);
                          const totalRevenue = cycleSales.reduce((sum, s) => sum + (Number(s.total) || 0), 0);
                          const debts = cycleSales.filter(s => s.status === 'Hutang');
                          
                          const avgSalePrice = cycleSales.length > 0 ? (totalRevenue / cycleSales.reduce((s, sale) => s + (Number(sale.amount) || 0), 0)) : 0;
                          
                          const cycleLogs = historyLogs.filter(log => log.cycleId === cycle.id);
                          let totalFeedCost = 0;
                          const feedUsage = {}; 
                          cycleLogs.forEach(log => {
                              if(log.feedBrand && log.feedAmount) {
                                  feedUsage[log.feedBrand] = (feedUsage[log.feedBrand] || 0) + Number(log.feedAmount);
                              }
                          });
                          Object.keys(feedUsage).forEach(brand => {
                              const brandExpenses = expenses.filter(e => e.category === 'Pakan' && e.brand === brand);
                              const totalAmount = brandExpenses.reduce((s, e) => s + (Number(e.amount) || 0), 0);
                              const totalQty = brandExpenses.reduce((s, e) => s + (Number(e.quantity) || 0), 0);
                              const avgPrice = totalQty > 0 ? totalAmount / totalQty : 0;
                              totalFeedCost += avgPrice * feedUsage[brand];
                          });

                          let totalMedCost = 0;
                          const medUsage = {};
                          let totalMedAmount = 0;
                          cycleLogs.forEach(log => {
                              if(log.medBrand && log.medAmount) {
                                  medUsage[log.medBrand] = (medUsage[log.medBrand] || 0) + Number(log.medAmount);
                                  totalMedAmount += Number(log.medAmount);
                              }
                          });
                          Object.keys(medUsage).forEach(brand => {
                              const brandExpenses = expenses.filter(e => e.category === 'Obat/Vitamin' && e.brand === brand);
                              const totalAmount = brandExpenses.reduce((s, e) => s + (Number(e.amount) || 0), 0);
                              const totalQty = brandExpenses.reduce((s, e) => s + (Number(e.quantity) || 0), 0);
                              const avgPrice = totalQty > 0 ? totalAmount / totalQty : 0;
                              totalMedCost += avgPrice * medUsage[brand];
                          });
                          
                          const safeSeedCost = Number(cycle.seedCost) || 0;
                          const totalExpense = safeSeedCost + totalFeedCost + totalMedCost;

                          return (
                            <tr key={cycle.id} className="hover:bg-slate-50 transition-colors">
                              <td className="px-4 py-4 font-bold text-slate-700 bg-slate-50/50">{cycle.id}</td>
                              <td className="px-4 py-4"><p className="font-bold text-teal-600">{cycle.pondName}</p><p className="text-[10px] text-slate-500 flex items-center gap-1 mt-0.5"><Fish size={10} /> {cycle.fishType}</p></td>
                              <td className="px-4 py-4"><p className="text-[11px] text-slate-600">{cycle.startDate} s/d</p><p className="text-[11px] font-bold text-slate-800">{cycle.endDate}</p></td>
                              <td className="px-4 py-4 font-bold text-slate-700 text-right">{avgSalePrice > 0 ? formatCurrency(avgSalePrice) : '-'}</td>
                              <td className="px-4 py-4 font-bold text-emerald-600 text-right">{(Number(cycle.totalHarvestWeight) || 0).toLocaleString()} Kg</td>
                              <td className="px-4 py-4 font-bold text-slate-600 text-right">{formatCurrency(safeSeedCost)}</td>
                              <td className="px-4 py-4"><p className="font-bold text-amber-600">{roundTwoDecimals(Number(cycle.totalFeed) || 0).toLocaleString()} Kg</p><p className="text-[10px] text-slate-500 mt-0.5">Biaya: <span className="font-bold text-red-500">{formatCurrency(totalFeedCost)}</span></p></td>
                              <td className="px-4 py-4"><p className="font-bold text-emerald-600">{roundTwoDecimals(totalMedAmount).toLocaleString()}</p><p className="text-[10px] text-slate-500 mt-0.5">Biaya: <span className="font-bold text-red-500">{formatCurrency(totalMedCost)}</span></p></td>
                              <td className="px-4 py-4 font-bold text-red-500 text-right">{formatCurrency(totalExpense)}</td>
                              <td className="px-4 py-4 font-bold text-emerald-600 text-right">{formatCurrency(totalRevenue)}</td>
                              <td className="px-4 py-4 text-center">
                                 <div className="flex gap-2 justify-center">
                                    <button 
                                      onClick={() => onOpenPrint({
                                        cycle,
                                        sales: sales.filter(s => s.cycleId === cycle.id),
                                        historyLogs: historyLogs.filter(h => h.cycleId === cycle.id),
                                        expenses: expenses,
                                        ponds: ponds.filter(p => p.cycleId === cycle.id || p.id === cycle.pondId),
                                        harvests: harvests.filter(h => h.cycleId === cycle.id),
                                        userProfile
                                      })} 
                                      className="bg-teal-50 text-teal-600 border border-teal-200 px-3 py-1.5 rounded-lg hover:bg-teal-600 hover:text-white transition shadow-sm flex items-center justify-center gap-2 font-bold text-xs" 
                                      title="Buka Analisa Laporan"
                                    >
                                        <Printer size={14}/> Cetak A4 Analisa
                                    </button>
                                 </div>
                              </td>
                            </tr>
                          )
                        }) : (<tr><td colSpan="11" className="px-4 py-12 text-center text-slate-400"><Archive size={32} className="mx-auto mb-3 opacity-30" /><p className="font-medium">Belum ada siklus yang selesai.</p></td></tr>)}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          );
        };

        const PondsTab = ({ ponds, historyLogs, expenses, onAddPond, onUpdatePond, onDeletePond, onAddHistory }) => {
          const [isModalOpen, setIsModalOpen] = useState(false);
          const [isMonitoringModalOpen, setIsMonitoringModalOpen] = useState(false);
          const [selectedPond, setSelectedPond] = useState(null);
          
          // History Table states
          const [filterPondId, setFilterPondId] = useState('all');
          const [historyStartDate, setHistoryStartDate] = useState('');
          const [historyEndDate, setHistoryEndDate] = useState('');
          const [historyPage, setHistoryPage] = useState(1);
          const ITEMS_PER_PAGE = 30;
          
          // New states for Edit and Detail functionality
          const [editingPond, setEditingPond] = useState(null);
          const [detailPond, setDetailPond] = useState(null);

          const [formData, setFormData] = useState({ name: '', area: '', depth: '', location: '', fishType: '', initialSize: '', stockQuantity: '', stockUnit: 'Ekor', biomass: '', fishPrice: '', fishPriceUnit: 'Ekor', targetDate: '', targetSize: '' });
          
          const generateCycleId = () => {
            const today = new Date();
            return `AQUA-${String(today.getDate()).padStart(2, '0')}${String(today.getMonth() + 1).padStart(2, '0')}${today.getFullYear()}-${String(ponds.length + 1).padStart(3, '0')}`;
          };
          const currentGeneratedCycleId = useMemo(() => generateCycleId(), [ponds.length, isModalOpen]);

          const getCurrentTime = () => {
            const now = new Date();
            return `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
          };

          const [monitoringData, setMonitoringData] = useState({ date: new Date().toISOString().split('T')[0], time: getCurrentTime(), feedType: '', feedBrand: '', feedAmount: '', medBrand: '', medAmount: '', medUnit: 'gr', mortality: '', sampleWeight: '', notes: '', temperature: '', ph: '', dissolvedOxygen: '', salinity: '' });

          // Perhitungan Pakan Tersedia di Inventori
          const availableFeeds = useMemo(() => {
             const feedStock = {};
             expenses.forEach(exp => {
                 if (exp.category === 'Pakan' && exp.brand) {
                     if (!feedStock[exp.brand]) feedStock[exp.brand] = 0;
                     feedStock[exp.brand] += (exp.quantity || 0);
                 }
             });
             historyLogs.forEach(log => {
                 if (log.feedBrand && log.feedAmount > 0) {
                     if (!feedStock[log.feedBrand]) feedStock[log.feedBrand] = 0;
                     feedStock[log.feedBrand] -= log.feedAmount;
                 }
             });
             return Object.keys(feedStock)
                 .filter(brand => roundTwoDecimals(feedStock[brand]) > 0)
                 .map(brand => ({ brand, stock: roundTwoDecimals(feedStock[brand]) }));
          }, [expenses, historyLogs]);

          const selectedFeedStock = useMemo(() => {
              const feed = availableFeeds.find(f => f.brand === monitoringData.feedBrand);
              return feed ? feed.stock : 0;
          }, [monitoringData.feedBrand, availableFeeds]);

          // Perhitungan Obat/Vitamin Tersedia di Inventori
          const availableMeds = useMemo(() => {
              const medStock = {};
              expenses.forEach(exp => {
                  if (exp.category === 'Obat/Vitamin' && exp.brand) {
                      if (!medStock[exp.brand]) medStock[exp.brand] = 0;
                      medStock[exp.brand] += (exp.quantity || 0);
                  }
              });
              historyLogs.forEach(log => {
                  if (log.medBrand && log.medAmount > 0) {
                      if (!medStock[log.medBrand]) medStock[log.medBrand] = 0;
                      medStock[log.medBrand] -= log.medAmount;
                  }
              });
              return Object.keys(medStock)
                  .filter(brand => roundTwoDecimals(medStock[brand]) > 0)
                  .map(brand => ({ brand, stock: roundTwoDecimals(medStock[brand]) }));
          }, [expenses, historyLogs]);

          const selectedMedStock = useMemo(() => {
              const med = availableMeds.find(m => m.brand === monitoringData.medBrand);
              return med ? med.stock : 0;
          }, [monitoringData.medBrand, availableMeds]);

          const handleChange = (e) => setFormData(prev => ({ ...prev, [e.target.name]: e.target.value }));
          const handleMonitoringChange = (e) => setMonitoringData(prev => ({ ...prev, [e.target.name]: e.target.value }));

          const handleOpenEdit = (pond) => {
              setEditingPond(pond);
              setFormData({
                  name: pond.name || '',
                  area: pond.area || '',
                  depth: pond.depth || '',
                  location: pond.location || '',
                  fishType: pond.fishType || '',
                  initialSize: pond.initialSize || '',
                  stockQuantity: pond.capacity || '',
                  stockUnit: pond.stockUnit || 'Ekor',
                  biomass: pond.biomass || '',
                  fishPrice: pond.fishPrice || '',
                  fishPriceUnit: pond.fishPriceUnit || 'Ekor',
                  targetDate: pond.targetDate || '',
                  targetSize: pond.targetSize || ''
              });
              setIsModalOpen(true);
          };

          const handleCloseModal = () => {
              setIsModalOpen(false);
              setEditingPond(null);
              setFormData({ name: '', area: '', depth: '', location: '', fishType: '', initialSize: '', stockQuantity: '', stockUnit: 'Ekor', biomass: '', fishPrice: '', fishPriceUnit: 'Ekor', targetDate: '', targetSize: '' });
          };

          const handleSubmit = (e) => {
            e.preventDefault();
            const price = parseFloat(formData.fishPrice) || 0;
            const newCapacity = parseInt(formData.stockQuantity) || 0;
            let calculatedSeedCost = newCapacity * price;
            
            if (editingPond) {
                const updatedPond = {
                    ...editingPond,
                    ...formData,
                    capacity: newCapacity,
                    fishPrice: price,
                    seedCost: calculatedSeedCost
                };
                onUpdatePond(updatedPond);
            } else {
                const newPond = {
                  id: Date.now().toString(), cycleId: currentGeneratedCycleId, ...formData,
                  capacity: newCapacity, currentStock: newCapacity,
                  dateStocked: new Date().toISOString().split('T')[0], fcr: 0, biomass: parseFloat(formData.biomass) || 0,
                  status: 'Aktif', fishPrice: price, seedCost: calculatedSeedCost
                };
                onAddPond(newPond);
            }
            handleCloseModal();
          };

          const handleMonitoringSubmit = (e) => {
            e.preventDefault();
            const mortality = parseInt(monitoringData.mortality) || 0;
            const sampleWeight = parseFloat(monitoringData.sampleWeight) || 0;
            const feedAmountGiven = parseFloat(monitoringData.feedAmount) || 0;
            const medAmountGiven = parseFloat(monitoringData.medAmount) || 0;
            
            const currentStockAfterMortality = Math.max(0, selectedPond.currentStock - mortality);
            
            // Perhitungan Biomassa Otomatis: (Ikan Hidup * Berat Rata-rata) / 1000 => KG
            const calculatedBiomass = (currentStockAfterMortality * sampleWeight) / 1000;

            const newHistory = {
              id: Date.now().toString(), ...monitoringData, pondId: selectedPond.id, pondName: selectedPond.name, cycleId: selectedPond.cycleId,
              feedAmount: feedAmountGiven,
              medAmount: medAmountGiven,
              mortality: mortality, sampleWeight: sampleWeight,
              biomass: calculatedBiomass
            };
            onAddHistory(newHistory);
            setIsMonitoringModalOpen(false);
            setMonitoringData({ date: new Date().toISOString().split('T')[0], time: getCurrentTime(), feedType: '', feedBrand: '', feedAmount: '', medBrand: '', medAmount: '', medUnit: 'gr', mortality: '', sampleWeight: '', notes: '', temperature: '', ph: '', dissolvedOxygen: '', salinity: '' });
          };

          // Filter & Pagination Logic
          const filteredHistoryLogs = useMemo(() => {
              return historyLogs.filter(log => {
                  const pondMatch = filterPondId === 'all' || log.pondId === filterPondId;
                  const startDateMatch = !historyStartDate || log.date >= historyStartDate;
                  const endDateMatch = !historyEndDate || log.date <= historyEndDate;
                  return pondMatch && startDateMatch && endDateMatch;
              }).sort((a, b) => new Date(b.date) - new Date(a.date));
          }, [historyLogs, filterPondId, historyStartDate, historyEndDate]);

          const totalHistoryPages = Math.max(1, Math.ceil(filteredHistoryLogs.length / ITEMS_PER_PAGE));
          const paginatedHistoryLogs = filteredHistoryLogs.slice((historyPage - 1) * ITEMS_PER_PAGE, historyPage * ITEMS_PER_PAGE);

          // Reset page when filters change
          useEffect(() => { setHistoryPage(1); }, [filterPondId, historyStartDate, historyEndDate]);

          return (
            <div className="space-y-8">
              <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                <div><h3 className="text-xl font-bold text-slate-800">Manajemen Kolam Aktif</h3><p className="text-sm text-slate-500">Monitor operasional pakan dan pertumbuhan</p></div>
                <button onClick={() => { setEditingPond(null); setIsModalOpen(true); }} className="flex items-center gap-2 bg-teal-600 text-white px-4 py-2.5 rounded-lg hover:bg-teal-700 transition shadow-md font-semibold"><Plus size={18} /> Tambah Kolam</button>
              </div>
              
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
                {ponds.length > 0 ? ponds.map(pond => (
                  <div key={pond.id} className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col group hover:shadow-md transition-shadow relative">
                    {pond.status !== 'Aktif' && <div className="absolute inset-0 bg-white/80 backdrop-blur-[1px] z-10 flex flex-col items-center justify-center"><CheckCircle2 size={32} className="text-slate-400 mb-2" /><p className="font-bold text-slate-600 text-sm">Siklus Selesai</p></div>}
                    <div className="p-4 border-b border-slate-100 flex justify-between items-start bg-slate-50/50">
                      <div><h4 className="font-bold text-base text-slate-800">{pond.name}</h4><p className="text-[10px] text-slate-500 flex items-center gap-1 mt-1"><MapPin size={10} /> {pond.location}</p></div>
                      <span className={`px-2 py-0.5 text-[9px] font-black uppercase rounded-full ${pond.status === 'Aktif' ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-200 text-slate-600'}`}>{pond.status}</span>
                    </div>
                    <div className="p-4 flex-1 space-y-3.5">
                      <div className="flex justify-between items-center text-xs"><p className="font-bold text-slate-700"><Fish size={12} className="inline mr-1 text-teal-500" /> {pond.fishType}</p><p className="text-slate-400">{pond.cycleId}</p></div>
                      <div className="space-y-1.5"><div className="flex justify-between text-[11px] font-bold"><span className="text-slate-500">Sisa Populasi</span><span className="text-teal-600">{pond.currentStock.toLocaleString()} {pond.stockUnit || 'Ekor'}</span></div><div className="w-full bg-slate-100 rounded-full h-1.5 overflow-hidden"><div className="bg-teal-500 h-1.5 transition-all duration-500" style={{ width: pond.capacity > 0 ? `${(pond.currentStock / pond.capacity) * 100}%` : '0%' }}></div></div></div>
                      <div className="flex items-center gap-1.5 text-[11px] text-amber-700 bg-amber-50 p-2 rounded-md border border-amber-100"><Target size={12} /><span>Target: <b>{pond.targetSize}</b> pd {pond.targetDate}</span></div>
                    </div>
                    {/* BUTTON ACTIONS GRID */}
                    <div className="px-4 py-2.5 bg-slate-50 border-t border-slate-100 flex gap-2">
                      <button onClick={() => { setSelectedPond(pond); setMonitoringData(prev => ({ ...prev, time: getCurrentTime() })); setIsMonitoringModalOpen(true); }} className="flex-1 text-[11px] font-bold bg-teal-600 text-white border border-teal-600 py-1.5 rounded-md hover:bg-teal-700 transition shadow-sm">Monitoring</button>
                      <button onClick={() => setDetailPond(pond)} className="px-2.5 text-slate-500 hover:text-blue-500 border border-slate-200 bg-white rounded-md transition shadow-sm" title="Lihat Detail Kolam"><Info size={14} /></button>
                      <button onClick={() => handleOpenEdit(pond)} className="px-2.5 text-slate-500 hover:text-amber-500 border border-slate-200 bg-white rounded-md transition shadow-sm" title="Edit Data Kolam"><Edit size={14} /></button>
                      <button onClick={() => onDeletePond(pond.id)} className="px-2.5 text-slate-400 hover:text-red-500 border border-slate-200 bg-white rounded-md transition shadow-sm" title="Hapus Kolam"><Trash2 size={14} /></button>
                    </div>
                  </div>
                )) : (<div className="col-span-full py-12 text-center text-slate-400 bg-white border border-slate-200 rounded-xl border-dashed"><Droplets size={40} className="mx-auto mb-3 opacity-30" /><p className="font-medium text-slate-600">Belum ada kolam aktif.</p><p className="text-sm mt-1">Silakan tambah kolam baru untuk memulai siklus budidaya.</p></div>)}
              </div>

              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden mt-8">
                <div className="p-5 border-b border-slate-100 bg-slate-50/50 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                  <div className="flex items-center gap-2"><FileText size={20} className="text-teal-600" /><h3 className="text-lg font-bold text-slate-800">Riwayat Monitoring</h3></div>
                  <div className="flex flex-wrap items-center gap-3">
                     <div className="flex items-center gap-2 bg-white border border-slate-200 rounded-lg px-3 py-1.5">
                        <Calendar size={14} className="text-slate-400" />
                        <input type="date" value={historyStartDate} onChange={(e) => setHistoryStartDate(e.target.value)} className="bg-transparent outline-none text-xs text-slate-600 font-medium" />
                        <span className="text-slate-400">-</span>
                        <input type="date" value={historyEndDate} onChange={(e) => setHistoryEndDate(e.target.value)} className="bg-transparent outline-none text-xs text-slate-600 font-medium" />
                     </div>
                     <select value={filterPondId} onChange={(e) => setFilterPondId(e.target.value)} className="bg-white border border-slate-200 text-sm font-medium rounded-lg px-3 py-1.5 outline-none"><option value="all">Semua Kolam</option>{ponds.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}</select>
                  </div>
                </div>
                <div className="overflow-x-auto">
                  <table className="w-full text-left text-sm whitespace-nowrap">
                    <thead className="bg-slate-50 text-slate-500 border-b border-slate-200">
                      <tr>
                        <th className="px-5 py-4 font-bold uppercase text-[10px] tracking-wider">Waktu & Tanggal</th>
                        <th className="px-5 py-4 font-bold uppercase text-[10px] tracking-wider">Kolam</th>
                        <th className="px-5 py-4 font-bold uppercase text-[10px] tracking-wider">Pakan (Kg)</th>
                        <th className="px-5 py-4 font-bold uppercase text-[10px] tracking-wider">Obat / Vitamin</th>
                        <th className="px-5 py-4 font-bold uppercase text-[10px] tracking-wider text-right">Mati (Ekor)</th>
                        <th className="px-5 py-4 font-bold uppercase text-[10px] tracking-wider text-right">Biomassa (Kg)</th>
                        <th className="px-5 py-4 font-bold uppercase text-[10px] tracking-wider">Kualitas Air</th>
                        <th className="px-5 py-4 font-bold uppercase text-[10px] tracking-wider">Catatan</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100">
                      {paginatedHistoryLogs.length > 0 ? paginatedHistoryLogs.map((log) => (
                        <tr key={log.id} className="hover:bg-slate-50 transition-colors">
                          <td className="px-5 py-3 text-slate-600">
                            <p className="font-semibold">{log.date}</p>
                            {log.time && <p className="text-[10px] text-slate-400 font-bold flex items-center gap-0.5 mt-0.5"><Clock size={10}/> {log.time}</p>}
                          </td>
                          <td className="px-5 py-3 font-bold text-teal-600">{log.pondName}</td>
                          <td className="px-5 py-3">
                              <div className="font-semibold text-slate-700">{log.feedBrand || '-'}</div>
                              {log.feedAmount > 0 && <div className="text-[10px] text-amber-600 font-bold">-{log.feedAmount} Kg</div>}
                          </td>
                          <td className="px-5 py-3">
                              <div className="font-semibold text-slate-700">{log.medBrand || '-'}</div>
                              {log.medAmount > 0 && <div className="text-[10px] text-emerald-600 font-bold">-{log.medAmount} {log.medUnit}</div>}
                          </td>
                          <td className="px-5 py-3 font-bold text-red-500 text-right">{log.mortality}</td>
                          <td className="px-5 py-3 text-right">
                             <span className="font-bold text-emerald-600">{log.biomass ? `${log.biomass.toLocaleString(undefined, {maximumFractionDigits: 2})} Kg` : '-'}</span>
                             {log.sampleWeight > 0 && <p className="text-[9px] text-slate-400 mt-0.5">ABW: {log.sampleWeight} gr</p>}
                          </td>
                          <td className="px-5 py-3">
                            <div className="flex flex-col gap-0.5 text-[10px] text-slate-500">
                              {log.temperature && <span>Suhu: <b className="text-slate-700">{log.temperature}°C</b></span>}
                              {log.ph && <span>pH: <b className="text-slate-700">{log.ph}</b></span>}
                              {log.dissolvedOxygen && <span>DO: <b className="text-slate-700">{log.dissolvedOxygen}</b></span>}
                              {log.salinity && <span>Salinitas: <b className="text-slate-700">{log.salinity}</b></span>}
                              {!log.temperature && !log.ph && !log.dissolvedOxygen && !log.salinity && <span>-</span>}
                            </div>
                          </td>
                          <td className="px-5 py-3 text-slate-500 max-w-[200px] truncate" title={log.notes}>{log.notes || '-'}</td>
                        </tr>
                      )) : (<tr><td colSpan="8" className="px-5 py-12 text-center text-slate-400"><FileText size={32} className="mx-auto mb-3 opacity-30" /><p className="font-medium">Belum ada riwayat operasional sesuai filter.</p></td></tr>)}
                    </tbody>
                  </table>
                </div>
                {/* Pagination Controls */}
                {totalHistoryPages > 1 && (
                  <div className="p-4 border-t border-slate-100 flex items-center justify-between bg-slate-50/50">
                    <span className="text-xs text-slate-500 font-medium">Menampilkan halaman {historyPage} dari {totalHistoryPages}</span>
                    <div className="flex items-center gap-2">
                        <button onClick={() => setHistoryPage(p => Math.max(1, p - 1))} disabled={historyPage === 1} className="p-1.5 rounded-lg bg-white border border-slate-200 text-slate-600 hover:bg-teal-50 hover:text-teal-600 hover:border-teal-200 disabled:opacity-50 disabled:cursor-not-allowed transition shadow-sm"><ChevronLeft size={16}/></button>
                        <button onClick={() => setHistoryPage(p => Math.min(totalHistoryPages, p + 1))} disabled={historyPage === totalHistoryPages} className="p-1.5 rounded-lg bg-white border border-slate-200 text-slate-600 hover:bg-teal-50 hover:text-teal-600 hover:border-teal-200 disabled:opacity-50 disabled:cursor-not-allowed transition shadow-sm"><ChevronRight size={16}/></button>
                    </div>
                  </div>
                )}
              </div>

              {/* MODAL TAMBAH/EDIT KOLAM */}
              {isModalOpen && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                  <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-hidden flex flex-col animate-in fade-in zoom-in duration-200">
                    <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-white sticky top-0 z-10"><h3 className="text-xl font-bold text-slate-800">{editingPond ? 'Edit Informasi Kolam' : 'Registrasi Kolam Baru'}</h3><button onClick={handleCloseModal} className="text-slate-400 hover:text-slate-600"><X size={24} /></button></div>
                    <form onSubmit={handleSubmit} className="flex-1 overflow-y-auto p-6 space-y-6 scrollbar-hide">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                          <div className="space-y-1.5"><label className="text-sm font-semibold text-slate-700">Nama Kolam</label><input required name="name" value={formData.name} onChange={handleChange} className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none transition" placeholder="Ex: Kolam Nila A" /></div>
                          <div className="space-y-1.5"><label className="text-sm font-semibold text-slate-700">Lokasi</label><input required name="location" value={formData.location} onChange={handleChange} className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none transition" placeholder="Ex: Blok Utara" /></div>
                          
                          <div className="grid grid-cols-2 gap-3">
                            <div className="space-y-1.5"><label className="text-sm font-semibold text-slate-700">Luas (m²)</label><input type="number" step="any" onWheel={(e) => e.target.blur()} name="area" value={formData.area} onChange={handleChange} className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none transition" placeholder="0" /></div>
                            <div className="space-y-1.5"><label className="text-sm font-semibold text-slate-700">Kedalaman (m)</label><input type="number" step="any" onWheel={(e) => e.target.blur()} name="depth" value={formData.depth} onChange={handleChange} className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none transition" placeholder="0" /></div>
                          </div>
                          
                          <div className="space-y-1.5"><label className="text-sm font-semibold text-slate-700">Jenis Ikan</label><input required name="fishType" value={formData.fishType} onChange={handleChange} className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none transition" placeholder="Ex: Nila Merah" /></div>
                          <div className="space-y-1.5"><label className="text-sm font-semibold text-slate-700">Ukuran Ikan Awal</label><input required name="initialSize" value={formData.initialSize} onChange={handleChange} className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none transition" placeholder="Ex: 5-7 cm / 10 gram" /></div>
                          
                          <div className="space-y-1.5">
                            <label className="text-sm font-semibold text-slate-700">Jumlah Tebar Awal</label>
                            <div className="flex">
                              <input required type="number" onWheel={(e) => e.target.blur()} name="stockQuantity" value={formData.stockQuantity} onChange={handleChange} className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-l-lg focus:ring-2 focus:ring-teal-500 outline-none transition" placeholder="0" />
                              <select name="stockUnit" value={formData.stockUnit} onChange={handleChange} className="bg-slate-100 border-y border-r border-slate-200 rounded-r-lg px-3 text-sm font-semibold text-slate-700 outline-none focus:ring-2 focus:ring-teal-500">
                                <option value="Ekor">Ekor</option>
                                <option value="Kg">Kg</option>
                                <option value="Liter">Liter</option>
                                <option value="Cangkir">Cangkir</option>
                              </select>
                            </div>
                          </div>
                        </div>
                        <div className="bg-teal-50 p-4 rounded-xl border border-teal-100 space-y-4">
                          <h4 className="text-xs font-bold text-teal-600 uppercase tracking-widest">Informasi Biaya Bibit</h4>

                           <select name="medBrand" value={monitoringData.medBrand} onChange={handleMonitoringChange} className="w-full px-3 py-1.5 bg-white border border-slate-200 rounded-lg focus:ring-1 focus:ring-emerald-500 outline-none text-sm cursor-pointer">
                             <option value="">-- Pilih dari Inventori (Opsional) --</option>
                             {availableMeds.map(med => (
                               <option key={med.brand} value={med.brand}>{med.brand} (Tersedia: {med.stock.toLocaleString()})</option>
                             ))}
                           </select>
                           {availableMeds.length === 0 && <p className="text-[10px] text-red-500 italic mt-0.5 flex items-center gap-1"><AlertTriangle size={10}/> Stok obat kosong. Catat pembelian di Keuangan dulu.</p>}
                         </div>

                         <div className="grid grid-cols-2 gap-3">
                           <div className="space-y-1.5">
                             <label className="text-xs font-semibold text-slate-700 flex justify-between">
                               <span>Jumlah (Qty)</span>
                               {monitoringData.medBrand && <span className="text-[9px] text-emerald-600 font-bold">Maks: {selectedMedStock}</span>}
                             </label>
                             <input type="number" step="any" onWheel={(e) => e.target.blur()} max={selectedMedStock || ""} name="medAmount" value={monitoringData.medAmount} onChange={handleMonitoringChange} disabled={!monitoringData.medBrand} className="w-full px-4 py-1.5 bg-white border border-slate-200 rounded-lg focus:ring-1 focus:ring-emerald-500 outline-none text-sm disabled:bg-slate-100 disabled:cursor-not-allowed" placeholder="0" />
                           </div>
                           <div className="space-y-1.5">
                             <label className="text-xs font-semibold text-slate-700">Satuan</label>
                             <select name="medUnit" value={monitoringData.medUnit} onChange={handleMonitoringChange} disabled={!monitoringData.medBrand} className="w-full px-3 py-1.5 bg-white border border-slate-200 rounded-lg focus:ring-1 focus:ring-emerald-500 outline-none text-sm disabled:bg-slate-100 disabled:cursor-not-allowed">
                               <option value="gr">gr</option>
                               <option value="ml">ml</option>
                               <option value="Botol">Botol</option>
                             </select>
                           </div>
                         </div>
                      </div>

                      <div className="p-4 bg-cyan-50 rounded-xl border border-cyan-100 space-y-3">
                         <p className="text-[10px] font-bold text-cyan-700 uppercase flex items-center gap-1"><Droplets size={12}/> Kualitas Air (Opsional)</p>
                         <div className="grid grid-cols-2 gap-4">
                            <div className="space-y-1.5"><label className="text-xs font-semibold text-slate-700">Suhu (°C)</label><input type="number" step="any" onWheel={(e) => e.target.blur()} name="temperature" value={monitoringData.temperature} onChange={handleMonitoringChange} className="w-full px-4 py-1.5 bg-white border border-slate-200 rounded-lg focus:ring-1 focus:ring-cyan-500 outline-none text-sm" placeholder="0.0" /></div>

                            <div className="space-y-1.5"><label className="text-xs font-semibold text-slate-700">Salinitas (ppt)</label><input type="number" step="any" onWheel={(e) => e.target.blur()} name="salinity" value={monitoringData.salinity} onChange={handleMonitoringChange} className="w-full px-4 py-1.5 bg-white border border-slate-200 rounded-lg focus:ring-1 focus:ring-cyan-500 outline-none text-sm" placeholder="0.0" /></div>

                         <div className="space-y-1.5"><label className="text-xs font-semibold text-slate-700">Berat Sampling/ABW (Gr)</label><input type="number" step="any" onWheel={(e) => e.target.blur()} name="sampleWeight" value={monitoringData.sampleWeight} onChange={handleMonitoringChange} className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg" placeholder="0.0" /></div>

                      <div className="space-y-1.5 pt-2">
                        <label className="text-xs font-semibold text-slate-700 flex items-center gap-1"><FileText size={12}/> Catatan Tambahan (Opsional)</label>

                      <button type="submit" className="w-full py-3 bg-teal-600 text-white rounded-lg font-bold hover:bg-teal-700 transition mt-2 disabled:opacity-50 disabled:cursor-not-allowed">Simpan Monitoring & Potong Stok</button>

                  </div>
                </div>
              )}
            </div>
          );
        };

        const SettingsTab = ({ prices, onUpdatePrices, userProfile, onUpdateProfile }) => {
          const [newPrice, setNewPrice] = useState({ fishType: '', size: '', price: '' });
          const [isEditingProfile, setIsEditingProfile] = useState(false);
          const [profileForm, setProfileForm] = useState(userProfile || { namaUsaha: '', namaLengkap: '', kelurahan: '', kecamatan: '', kota: '', alamatLengkap: '', noHp: '', email: '' });

          const handleAdd = (e) => {
              e.preventDefault();
              if(!newPrice.fishType || !newPrice.price) return;
              onUpdatePrices([...prices, { id: Date.now().toString(), ...newPrice, price: parseFloat(newPrice.price) }]);
              setNewPrice({ fishType: '', size: '', price: '' });
          };

          const handleProfileChange = (e) => setProfileForm({ ...profileForm, [e.target.name]: e.target.value });

          const handleSaveProfile = (e) => {
            e.preventDefault();
            onUpdateProfile({ ...userProfile, ...profileForm });
            setIsEditingProfile(false);
          };

          return (
              <div className="space-y-6">
                  <div className="flex justify-between items-center"><h3 className="text-xl font-bold text-slate-800">Pengaturan & Manajemen Harga</h3></div>

                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                      <div className="lg:col-span-1 space-y-6">
                          <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                              <div className="w-20 h-20 bg-teal-50 rounded-full mx-auto mb-4 flex items-center justify-center text-teal-600"><UserCog size={32} /></div>
                              {!isEditingProfile ? (
                                <div className="text-center animate-in fade-in duration-200">
                                  <h4 className="font-bold text-slate-800 text-lg">{userProfile?.namaUsaha || 'Nama Usaha'}</h4>
                                  <p className="text-sm text-slate-500 font-medium mb-4">{userProfile?.namaLengkap || 'Nama Pemilik'}</p>
                                  <div className="text-left bg-slate-50 p-4 rounded-xl space-y-3 mb-6">
                                    <div className="flex items-start gap-2 text-sm text-slate-600"><MapPin size={16} className="shrink-0 mt-0.5 text-slate-400" /><span className="leading-snug">{userProfile?.alamatLengkap ? <>{userProfile.alamatLengkap},<br/>Kel. {userProfile.kelurahan}, Kec. {userProfile.kecamatan},<br/>{userProfile.kota}</> : 'Alamat belum diatur'}</span></div>
                                    <div className="flex items-center gap-2 text-sm text-slate-600"><Phone size={16} className="text-slate-400" /><span>{userProfile?.noHp || '-'}</span></div>
                                    <div className="flex items-center gap-2 text-sm text-slate-600"><Mail size={16} className="text-slate-400" /><span className="truncate">{userProfile?.email || '-'}</span></div>
                                  </div>
                                  <button onClick={() => setIsEditingProfile(true)} className="w-full py-2.5 border border-slate-200 rounded-xl text-sm font-bold text-slate-600 hover:bg-slate-50 transition flex items-center justify-center gap-2"><Edit size={16} /> Ubah Profil Akun</button>
                                </div>
                              ) : (
                                <form onSubmit={handleSaveProfile} className="space-y-3 animate-in fade-in duration-200">
                                  <div className="space-y-1"><label className="text-[10px] font-bold text-slate-500 uppercase">Nama Usaha</label><input required name="namaUsaha" value={profileForm.namaUsaha} onChange={handleProfileChange} className="w-full px-3 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-teal-500" /></div>
                                  <div className="space-y-1"><label className="text-[10px] font-bold text-slate-500 uppercase">Nama Lengkap</label><input required name="namaLengkap" value={profileForm.namaLengkap} onChange={handleProfileChange} className="w-full px-3 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-teal-500" /></div>
                                  <div className="space-y-1"><label className="text-[10px] font-bold text-slate-500 uppercase">Alamat Lengkap</label><textarea required name="alamatLengkap" value={profileForm.alamatLengkap} onChange={handleProfileChange} className="w-full px-3 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-teal-500 resize-none" rows="2"></textarea></div>
                                  <div className="grid grid-cols-2 gap-2">
                                    <div className="space-y-1"><label className="text-[10px] font-bold text-slate-500 uppercase">Kelurahan</label><input required name="kelurahan" value={profileForm.kelurahan} onChange={handleProfileChange} className="w-full px-3 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-teal-500" /></div>
                                    <div className="space-y-1"><label className="text-[10px] font-bold text-slate-500 uppercase">Kecamatan</label><input required name="kecamatan" value={profileForm.kecamatan} onChange={handleProfileChange} className="w-full px-3 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-teal-500" /></div>
                                  </div>
                                  <div className="space-y-1"><label className="text-[10px] font-bold text-slate-500 uppercase">Kota/Kab. </label><input required name="kota" value={profileForm.kota} onChange={handleProfileChange} className="w-full px-3 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-teal-500" /></div>
                                  <div className="space-y-1"><label className="text-[10px] font-bold text-slate-500 uppercase">No HP</label><input required name="noHp" value={profileForm.noHp} onChange={handleProfileChange} className="w-full px-3 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-teal-500" /></div>
                                  <div className="flex gap-2 pt-3">
                                    <button type="button" onClick={() => setIsEditingProfile(false)} className="flex-1 py-2 bg-slate-100 text-slate-600 rounded-lg font-bold text-sm hover:bg-slate-200 transition">Batal</button>
                                    <button type="submit" className="flex-1 py-2 bg-teal-600 text-white rounded-lg font-bold text-sm hover:bg-teal-700 transition">Simpan</button>
                                  </div>
                                </form>
                              )}
                          </div>
                      </div>

                              <div className="p-6">
                                  <form onSubmit={handleAdd} className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8 bg-slate-50 p-4 rounded-xl border border-slate-100">

                                      {prices.map(p => (
                                          <div key={p.id} className="flex justify-between items-center p-3 border rounded-xl hover:border-teal-200 transition bg-white group shadow-sm">
                                              <div className="flex items-center gap-4"><div className="p-2 bg-teal-50 text-teal-600 rounded-lg group-hover:bg-teal-600 group-hover:text-white transition"><Fish size={16}/></div><div><p className="text-sm font-bold text-slate-800">{p.fishType}</p><p className="text-[10px] text-slate-400">{p.size} • <b>{formatCurrency(p.price)}/kg</b></p></div></div>
                                              <button onClick={() => onUpdatePrices(prices.filter(item => item.id !== p.id))} className="p-2 text-slate-300 hover:text-red-500 transition"><Trash2 size={16}/></button>
                                          </div>
                                      ))}
                                      {prices.length === 0 && <p className="text-sm text-center text-slate-400 italic">Belum ada harga pasar. Silakan tambahkan.</p>}
                                  </div>
                              </div>
                          </div>
                      </div>
                  </div>
              </div>
          );
        };

        const App = () => {
          // --- STATE BARU: Laporan Overlay In-App ---
          const [printReportData, setPrintReportData] = useState(null);

          const [isAuthenticated, setIsAuthenticated] = useState(false);
          const [registeredUser, setRegisteredUser] = useState(null);
          const [userProfile, setUserProfile] = useState(null);

          const [activeTab, setActiveTab] = useState('dashboard');
          const [isSidebarOpen, setIsSidebarOpen] = useState(true);
          
          const [ponds, setPonds] = useState(INITIAL_PONDS);
          const [historyLogs, setHistoryLogs] = useState(INITIAL_HISTORY); 
          const [harvests, setHarvests] = useState(INITIAL_HARVESTS);
          const [completedCycles, setCompletedCycles] = useState(INITIAL_COMPLETED_CYCLES);
          const [sales, setSales] = useState(INITIAL_SALES);
          const [expenses, setExpenses] = useState(INITIAL_EXPENSES);
          const [prices, setPrices] = useState(INITIAL_PRICES);

          const menuItems = [
            { id: 'dashboard', icon: <LayoutDashboard size={20} />, label: 'Dashboard' },
            { id: 'ponds', icon: <Droplets size={20} />, label: 'Manajemen Kolam' },
            { id: 'harvest', icon: <ShoppingCart size={20} />, label: 'Panen Produksi' },
            { id: 'sales', icon: <BadgeDollarSign size={20} />, label: 'Penjualan Panen' },
            { id: 'finance', icon: <Wallet size={20} />, label: 'Keuangan' },
            { id: 'inventory', icon: <Box size={20} />, label: 'Inventori' },
            { id: 'cycles', icon: <Archive size={20} />, label: 'Siklus Panen' },
            { id: 'settings', icon: <Settings size={20} />, label: 'Pengaturan' },
          ];

          const handleAddPond = (newPond) => setPonds(prev => [...prev, newPond]);
          const handleUpdatePond = (updatedPond) => setPonds(prev => prev.map(p => p.id === updatedPond.id ? updatedPond : p));
          const handleDeletePond = (id) => setPonds(prev => prev.filter(p => p.id !== id));
          
          const handleAddHistory = (newHistory) => {
            setHistoryLogs(prev => [newHistory, ...prev]);
            if (newHistory.mortality > 0) {
              setPonds(prevPonds => prevPonds.map(p => p.id === newHistory.pondId ? { ...p, currentStock: Math.max(0, p.currentStock - newHistory.mortality) } : p));
            }
          };

          const handleAddHarvest = (harvestData) => {
            const pondToArchive = ponds.find(p => p.id === harvestData.pondId);
            if (pondToArchive) {
              const enrichedHarvest = { ...harvestData, pondName: pondToArchive.name, cycleId: pondToArchive.cycleId, fishType: pondToArchive.fishType };
              setHarvests([enrichedHarvest, ...harvests]);

              const pondCycleLogs = historyLogs.filter(h => h.cycleId === pondToArchive.cycleId);
              const totalFeedUsed = pondCycleLogs.reduce((sum, log) => sum + (Number(log.feedAmount) || 0), 0);

              const newCompletedCycle = { id: pondToArchive.cycleId, pondName: pondToArchive.name, fishType: pondToArchive.fishType, startDate: pondToArchive.dateStocked, endDate: harvestData.date, totalHarvestWeight: harvestData.totalWeight, totalFeed: totalFeedUsed, seedCost: pondToArchive.seedCost || 0, stockUnit: pondToArchive.stockUnit || 'Ekor' };
              setCompletedCycles([newCompletedCycle, ...completedCycles]);

              setPonds(ponds.map(p => p.id === pondToArchive.id ? { ...p, status: 'Selesai Panen' } : p));
            }
          };

          const handleUpdateHarvest = (updatedHarvest) => setHarvests(prev => prev.map(h => h.id === updatedHarvest.id ? updatedHarvest : h));

          const handleAddSale = (saleData) => {
            setSales([saleData, ...sales]);
            const harvest = harvests.find(h => h.id === saleData.harvestId);
            if (harvest) {
              setPonds(prev => prev.map(p => p.id === harvest.pondId ? { ...p, status: 'Terjual' } : p));
            }
          };
          
          const handleUpdateSale = (updatedSale) => setSales(prev => prev.map(s => s.id === updatedSale.id ? updatedSale : s));
          
          const handleAddExpense = (expenseData) => setExpenses([expenseData, ...expenses]);
          const handleUpdateExpense = (updatedExpense) => setExpenses(prev => prev.map(e => e.id === updatedExpense.id ? updatedExpense : e));

          const handleRegister = (data) => setRegisteredUser(data);
          const handleLogin = (user) => { setUserProfile(user); setIsAuthenticated(true); };
          const handleLogout = () => setIsAuthenticated(false);

          if (!isAuthenticated) {
            return <AuthScreen onLogin={handleLogin} onRegister={handleRegister} registeredUser={registeredUser} />;
          }

          // Jika State Cetak Terisi, Render Halaman Laporan secara Penuh Menutupi Layar
          if (printReportData) {
            return <PrintReportView reportData={printReportData} onClose={() => setPrintReportData(null)} />;
          }

          return (
            <div className="flex h-screen bg-slate-50 font-sans text-slate-900 overflow-hidden print:hidden">
              <aside className={`bg-slate-900 text-white transition-all duration-300 flex flex-col ${isSidebarOpen ? 'w-64' : 'w-20'} no-print`}>
                <div className={`flex items-center justify-center border-b border-slate-800 transition-all duration-300 shrink-0 ${isSidebarOpen ? 'p-6 h-24' : 'p-4 h-20'}`}>
                  <img src={LOGO_URL} alt="App Logo" className={`object-contain transition-all duration-300 ${isSidebarOpen ? 'h-14' : 'h-8'}`} />
                </div>
                <nav className="flex-1 py-6 px-3 space-y-1 overflow-y-auto scrollbar-hide">
                  {menuItems.map((item) => (
                    <button
                      key={item.id}
                      onClick={() => setActiveTab(item.id)}
                      className={`w-full flex items-center gap-4 px-4 py-3 rounded-xl transition duration-200 ${
                        activeTab === item.id ? 'bg-teal-600 text-white shadow-lg shadow-teal-900/20' : 'text-slate-400 hover:bg-slate-800 hover:text-white'
                      }`}
                      title={item.label}
                    >
                      <div className="shrink-0">{item.icon}</div>
                      {isSidebarOpen && <span className="font-medium text-sm whitespace-nowrap">{item.label}</span>}
                    </button>
                  ))}
                </nav>
                {isSidebarOpen && (
                   <div className="p-4 border-t border-slate-800 flex justify-between items-center">
                      <div className="truncate pr-2">
                        <p className="text-xs font-bold text-white truncate">{userProfile?.namaUsaha || 'Nama Usaha'}</p>
                        <p className="text-[10px] text-slate-400 truncate">{userProfile?.namaLengkap || 'Admin'}</p>
                      </div>
                      <button onClick={handleLogout} className="p-2 bg-slate-800 hover:bg-red-500 hover:text-white rounded-lg transition shrink-0" title="Keluar"><Lock size={16} /></button>
                   </div>
                )}
              </aside>

              <main className="flex-1 flex flex-col overflow-hidden">
                <header className="bg-white border-b border-slate-200 h-16 flex items-center justify-between px-6 shrink-0 no-print">
                  <div className="flex items-center gap-4">
                    <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 text-slate-500 hover:bg-slate-100 rounded-lg"><Menu size={20} /></button>
                    <h2 className="text-lg font-bold text-slate-800 capitalize">{activeTab.replace('-', ' ')}</h2>
                  </div>
                  <div className="flex items-center gap-3">
                     <div className="hidden sm:block text-right">
                        <p className="text-xs font-bold text-slate-800">{userProfile?.namaUsaha || 'Nama Usaha'}</p>
                        <p className="text-[10px] text-slate-500">{userProfile?.namaLengkap || 'Admin'}</p>
                     </div>
                     <div className="w-9 h-9 rounded-full bg-teal-100 text-teal-600 flex items-center justify-center font-bold border border-teal-200">
                        {userProfile?.namaLengkap ? userProfile.namaLengkap.charAt(0).toUpperCase() : 'A'}
                     </div>
                  </div>
                </header>

                <div className="flex-1 overflow-y-auto p-6 md:p-8 relative">
                  <div className="max-w-7xl mx-auto pb-12">
                    {activeTab === 'dashboard' && <DashboardTab ponds={ponds} historyLogs={historyLogs} />}
                    {activeTab === 'harvest' && <HarvestTab ponds={ponds} harvests={harvests} onAddHarvest={handleAddHarvest} onUpdateHarvest={handleUpdateHarvest} />}
                    {activeTab === 'sales' && <SalesTab harvests={harvests} sales={sales} prices={prices} historyLogs={historyLogs} completedCycles={completedCycles} onAddSale={handleAddSale} onUpdateSale={handleUpdateSale} />}
                    {activeTab === 'finance' && <FinanceTab sales={sales} ponds={ponds} completedCycles={completedCycles} expenses={expenses} onAddExpense={handleAddExpense} onUpdateExpense={handleUpdateExpense} />}
                    {activeTab === 'inventory' && <InventoryTab expenses={expenses} historyLogs={historyLogs} />}
                    {activeTab === 'cycles' && <CyclesTab completedCycles={completedCycles} sales={sales} expenses={expenses} historyLogs={historyLogs} ponds={ponds} harvests={harvests} userProfile={userProfile} onOpenPrint={setPrintReportData} />}
                    {activeTab === 'ponds' && <PondsTab ponds={ponds} historyLogs={historyLogs} expenses={expenses} onAddPond={handleAddPond} onUpdatePond={handleUpdatePond} onDeletePond={handleDeletePond} onAddHistory={handleAddHistory} />}
                    {activeTab === 'settings' && <SettingsTab prices={prices} onUpdatePrices={setPrices} userProfile={userProfile} onUpdateProfile={setUserProfile} />}
                  </div>
                </div>
              </main>
            </div>
          );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
